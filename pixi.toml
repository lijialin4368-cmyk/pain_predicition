[workspace]
channels = ["conda-forge"]
name = "myproject"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
rf-train = "python3 randomforest/train_random_forest_regression.py"
rf-predict = "python3 randomforest/predict.py"
rf-plot = "MPLCONFIGDIR=/tmp/matplotlib python3 randomforest/visualize_outputs.py"

[dependencies]
python = "3.10.*"
pandas = ">=2.3.3,<3"
numpy = ">=2.2.6,<3"
jupyterlab = ">=4.5.6,<5"
matplotlib = ">=3.10.8,<4"
vitaldb = ">=1.6.0,<2"
scikit-learn = ">=1.3,<2"
joblib = ">=1.3,<2"
