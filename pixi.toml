[workspace]
channels = ["conda-forge"]
name = "myproject"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
rf-train = "python3 randomforest/train_random_forest_regression.py"
rf-predict = "python3 randomforest/predict.py"
rf-plot = "MPLCONFIGDIR=/tmp/matplotlib python3 randomforest/visualize_outputs.py"
augment-data = "python3 data_augmentation/augment_dataset.py"
augment-data-comparison = "python3 data_augmentation/comparison_direct_copy/build_comparison_dataset.py"
rf-train-comparison = "python3 randomforest/train_random_forest_regression.py --data-path data_augmentation/comparison_direct_copy/generated/augmented_dataset.csv --output-dir randomforest/outputs_comparison --artifact-dir randomforest/artifacts_comparison"
rf-plot-comparison = "MPLCONFIGDIR=/tmp/matplotlib python3 randomforest/visualize_outputs.py --output-dir randomforest/outputs_comparison"
rf-predict-comparison = "python3 randomforest/predict.py --model-path randomforest/artifacts_comparison/rf_regressor.joblib --output-path randomforest/outputs_comparison/inference_predictions.csv"
hp-scheme-a-build = "python3 high_pain_scheme_a/build_datasets.py"
hp-scheme-a-train = "python3 high_pain_scheme_a/train_random_forest_experiment.py"
hp-scheme-a-plot = "MPLCONFIGDIR=/tmp/matplotlib python3 high_pain_scheme_a/visualize_outputs.py"
std-rf-raw-train = "python3 standard_rf_rawdata/train_random_forest_regression.py"
std-rf-raw-plot = "MPLCONFIGDIR=/tmp/matplotlib python3 standard_rf_rawdata/visualize_outputs.py"
std-rf-raw-predict = "python3 standard_rf_rawdata/predict.py"
rf-multitarget-batch = "MPLCONFIGDIR=/tmp/matplotlib python3 run_multitarget_rf_strategies.py"

[dependencies]
python = "3.10.*"
pandas = ">=2.3.3,<3"
numpy = ">=2.2.6,<3"
jupyterlab = ">=4.5.6,<5"
matplotlib = ">=3.10.8,<4"
vitaldb = ">=1.6.0,<2"
scikit-learn = ">=1.3,<2"
joblib = ">=1.3,<2"
