[workspace]
channels = ["conda-forge"]
name = "myproject"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build-reference-splits = "python3 splits/build_reference_splits.py --seeds 42 --train-ratio 0.8 --val-ratio 0.1 --test-ratio 0.1"
clean-data = "python3 scripts/clean_data.py"
logistic-train = "python3 models/logistic/train.py --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/logistic/outputs"
logistic-train-smote = "python3 models/logistic/train.py --data-path experiments/borderline_smote/generated/augmented_dataset.csv --day 术后第一天 --pain-type rest --output-dir models/logistic/outputs/borderline_smote"
logistic-train-ctgan = "python3 models/logistic/train.py --data-path experiments/generative_tabular/generated/ctgan/classification/augmented_dataset.csv --day 术后第一天 --pain-type rest --output-dir models/logistic/outputs/ctgan_cls"
logistic-train-tvae = "python3 models/logistic/train.py --data-path experiments/generative_tabular/generated/tvae/classification/augmented_dataset.csv --day 术后第一天 --pain-type rest --output-dir models/logistic/outputs/tvae_cls"
mlp-train = "python3 models/mlp/train.py --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/mlp/outputs"
mlp-train-smote = "python3 models/mlp/train.py --data-path experiments/borderline_smote/generated/augmented_dataset.csv --day 术后第一天 --pain-type rest --single-target --output-dir models/mlp/outputs/borderline_smote"
mlp-train-ctgan = "python3 models/mlp/train.py --data-path experiments/generative_tabular/generated/ctgan/classification/augmented_dataset.csv --day 术后第一天 --pain-type rest --single-target --output-dir models/mlp/outputs/ctgan_cls"
mlp-train-tvae = "python3 models/mlp/train.py --data-path experiments/generative_tabular/generated/tvae/classification/augmented_dataset.csv --day 术后第一天 --pain-type rest --single-target --output-dir models/mlp/outputs/tvae_cls"
dummy-train-mean = "python3 models/dummy/train_regression.py --strategy mean --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/dummy/outputs/raw_mean --artifact-dir models/dummy/artifacts/raw_mean"
dummy-train-median = "python3 models/dummy/train_regression.py --strategy median --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/dummy/outputs/raw_median --artifact-dir models/dummy/artifacts/raw_median"
linear-train-ridge = "python3 models/linear_regression/train_regression.py --model ridge --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/linear_regression/outputs/raw_ridge --artifact-dir models/linear_regression/artifacts/raw_ridge"
linear-train-elasticnet = "python3 models/linear_regression/train_regression.py --model elasticnet --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/linear_regression/outputs/raw_elasticnet --artifact-dir models/linear_regression/artifacts/raw_elasticnet"
rf-train-raw = "python3 models/random_forest/train_regression.py --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/random_forest/outputs/raw --artifact-dir models/random_forest/artifacts/raw"
rf-train-aug = "python3 models/random_forest/train_regression.py --data-path experiments/augmentation/generated/augmented_dataset.csv --output-dir models/random_forest/outputs/augmented --artifact-dir models/random_forest/artifacts/augmented"
rf-train-copy = "python3 models/random_forest/train_regression.py --data-path experiments/augmentation_copy_control/generated/augmented_dataset.csv --output-dir models/random_forest/outputs/copy_control --artifact-dir models/random_forest/artifacts/copy_control"
rf-train-ctgan = "python3 models/random_forest/train_regression.py --data-path experiments/generative_tabular/generated/ctgan/regression/augmented_dataset.csv --output-dir models/random_forest/outputs/ctgan_reg --artifact-dir models/random_forest/artifacts/ctgan_reg"
rf-train-tvae = "python3 models/random_forest/train_regression.py --data-path experiments/generative_tabular/generated/tvae/regression/augmented_dataset.csv --output-dir models/random_forest/outputs/tvae_reg --artifact-dir models/random_forest/artifacts/tvae_reg"
rf-train-tail-aware-raw = "python3 models/random_forest/train_regression.py --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --sample-weight-mode focal_residual --high-pain-threshold 4 --high-pain-weight 2.5 --severe-pain-threshold 7 --severe-pain-weight 4 --focal-alpha 1 --focal-gamma 2 --max-final-sample-weight 10 --enable-quantile-policy --quantile-grid 0.50,0.60,0.70 --prediction-policy-metric combined --tail-mae-weight 0.10 --underprediction-weight 0.10 --enable-residual-calibration --output-dir models/random_forest/outputs/tail_aware_raw --artifact-dir models/random_forest/artifacts/tail_aware_raw"
rf-train-tail-aware-recall-raw = "python3 models/random_forest/train_regression.py --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --sample-weight-mode focal_residual --high-pain-threshold 4 --high-pain-weight 2.5 --severe-pain-threshold 7 --severe-pain-weight 4 --focal-alpha 1 --focal-gamma 2 --max-final-sample-weight 25 --enable-quantile-policy --quantile-grid 0.50,0.60,0.70,0.80,0.90 --prediction-policy-metric combined --tail-mae-weight 0.25 --underprediction-weight 0.25 --enable-residual-calibration --output-dir models/random_forest/outputs/tail_aware_recall_raw --artifact-dir models/random_forest/artifacts/tail_aware_recall_raw"
rf-predict-raw = "python3 models/random_forest/predict.py --data-path data/processed/data_vectorized.csv --model-path models/random_forest/artifacts/raw/rf_regressor.joblib --output-path models/random_forest/outputs/raw/inference_predictions.csv"
rf-plot-raw = "MPLCONFIGDIR=/tmp/matplotlib python3 models/random_forest/plot.py --output-dir models/random_forest/outputs/raw"
rf-plot-aug = "MPLCONFIGDIR=/tmp/matplotlib python3 models/random_forest/plot.py --output-dir models/random_forest/outputs/augmented"
rf-plot-copy = "MPLCONFIGDIR=/tmp/matplotlib python3 models/random_forest/plot.py --output-dir models/random_forest/outputs/copy_control"
rf-plot-tail-aware-raw = "MPLCONFIGDIR=/tmp/matplotlib python3 models/random_forest/plot.py --output-dir models/random_forest/outputs/tail_aware_raw"
rf-plot-tail-aware-recall-raw = "MPLCONFIGDIR=/tmp/matplotlib python3 models/random_forest/plot.py --output-dir models/random_forest/outputs/tail_aware_recall_raw"
xgb-train-raw = "python3 models/xgboost/train_regression.py --data-path data/processed/data_vectorized.csv --split-file splits/reference_splits_seed_42.csv --split-seed 42 --output-dir models/xgboost/outputs/raw --artifact-dir models/xgboost/artifacts/raw"
xgb-train-aug = "python3 models/xgboost/train_regression.py --data-path experiments/augmentation/generated/augmented_dataset.csv --output-dir models/xgboost/outputs/augmented --artifact-dir models/xgboost/artifacts/augmented"
xgb-train-ctgan = "python3 models/xgboost/train_regression.py --data-path experiments/generative_tabular/generated/ctgan/regression/augmented_dataset.csv --output-dir models/xgboost/outputs/ctgan_reg --artifact-dir models/xgboost/artifacts/ctgan_reg"
xgb-train-tvae = "python3 models/xgboost/train_regression.py --data-path experiments/generative_tabular/generated/tvae/regression/augmented_dataset.csv --output-dir models/xgboost/outputs/tvae_reg --artifact-dir models/xgboost/artifacts/tvae_reg"
xgb-predict-raw = "python3 models/xgboost/predict.py --data-path data/processed/data_vectorized.csv --model-path models/xgboost/artifacts/raw/xgb_regressor.joblib --output-path models/xgboost/outputs/raw/inference_predictions.csv"
xgb-plot-raw = "MPLCONFIGDIR=/tmp/matplotlib python3 models/xgboost/plot.py --output-dir models/xgboost/outputs/raw"
xgb-plot-aug = "MPLCONFIGDIR=/tmp/matplotlib python3 models/xgboost/plot.py --output-dir models/xgboost/outputs/augmented"
registry-refresh = "python3 registry/model_output_registry.py"
augment-build = "python3 experiments/augmentation/build_augmented_data.py"
augment-copy-build = "python3 experiments/augmentation_copy_control/build_dataset.py"
smote-build = "python3 experiments/borderline_smote/build_dataset.py"
gen-ctgan-cls-build = "python3 experiments/generative_tabular/build_dataset.py --method ctgan --task classification --target-column 术后第一天_静息痛 --target-threshold 4 --output-dir experiments/generative_tabular/generated/ctgan/classification"
gen-tvae-cls-build = "python3 experiments/generative_tabular/build_dataset.py --method tvae --task classification --target-column 术后第一天_静息痛 --target-threshold 4 --output-dir experiments/generative_tabular/generated/tvae/classification"
gen-ctgan-reg-build = "python3 experiments/generative_tabular/build_dataset.py --method ctgan --task regression --target-column 术后第一天_静息痛 --output-dir experiments/generative_tabular/generated/ctgan/regression"
gen-tvae-reg-build = "python3 experiments/generative_tabular/build_dataset.py --method tvae --task regression --target-column 术后第一天_静息痛 --output-dir experiments/generative_tabular/generated/tvae/regression"
hp-logistic-tune = "python3 experiments/high_pain_augmentation/tune_logistic_high_pain.py --train-script models/logistic/train.py --extra-args --split-file splits/reference_splits_seed_42.csv --split-seed 42"
missingness-report = "python3 reports/missingness/run_missingness_analysis.py"
distribution-report = "python3 reports/distribution/data_analysis/data_distribution_analysis.py --input data/processed/data_vectorized.csv"

[dependencies]
python = "3.10.*"
pandas = ">=2.3.3,<3"
numpy = ">=2.2.6,<3"
jupyterlab = ">=4.5.6,<5"
matplotlib = ">=3.10.8,<4"
vitaldb = ">=1.6.0,<2"
scikit-learn = ">=1.3,<2"
joblib = ">=1.3,<2"
xgboost = ">=2.0,<3"
imbalanced-learn = ">=0.12,<1"
sdv = ">=1.12,<2"
